interface:
  display_name: "Obsidian Note Taker"
  short_description: "Read and write personal vault notes"
  default_prompt: "Use $obsidian-note-taker to save this conversation summary to my Obsidian vault."

dependencies:
  tools:
    - type: "mcp"
      value: "obsidian"
      description: "Local Obsidian vault access through the Obsidian Local REST API MCP server"
      transport: "stdio"

policy:
  allow_implicit_invocation: true
