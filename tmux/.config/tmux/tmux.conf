# Refresh tmux configuration
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# Set prefix
unbind C-b
set -g prefix C-s
# bind C-Space send-prefix

set -g set-clipboard on

# Vim mode
setw -g mode-keys vi

# After <C-s>+[ you enter copy mode.
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle
bind-key -T copy-mode-vi 'u' send -X copy-pipe-line-and-cancel "~/.local/bin/tmux-open-url"
bind-key -T copy-mode-vi 'U' send -X copy-pipe-and-cancel "~/.local/bin/tmux-open-url"
bind-key -T copy-mode-vi '/' command-prompt -T search -p "Search down" { send -X search-forward "%%" }
bind-key -T copy-mode-vi '?' command-prompt -T search -p "Search up" { send -X search-backward "%%" }
bind-key -T copy-mode-vi 'n' send -X search-again
bind-key -T copy-mode-vi 'N' send -X search-reverse

# set 24 bit color
# set -g default-terminal "tmux*"
set-option -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm*:Tc"

# Set zsh as default shell
set-option -g default-shell /bin/zsh

#Allow mouse use
set -g mouse on

# Start windows and panes counting at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Window names are sticky: only change via `prefix + ,` (rename-window).
# - automatic-rename off: don't auto-rename to the foreground command
# - allow-rename off:     ignore OSC title escape sequences from TUIs
set -g automatic-rename off
set -g allow-rename off

# Open panes in current directory sa it is easier to navigate home if you need
# rather than to navigate where you were
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# For displaying images in the terminal
set-option -g allow-passthrough on

# Shift Alt vim heys to switch windows
bind -n M-h previous-window
bind -n M-l next-window

set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-sensible'
# C-hjkl to navigate panes
set -g @plugin 'christoomey/vim-tmux-navigator'
# Theme configuration (Rosé Pine)
set -g @plugin 'rose-pine/tmux'
set -g @rose_pine_variant 'moon'
set -g @rose_pine_host 'on'
set -g @rose_pine_hostname_short 'on'
set -g @rose_pine_directory 'on'
set -g @rose_pine_date_time '%H:%M %d-%b'
# Hide the active-window section in status-left: avoids layout shift when the
# focused window's name length changes.
set -g @rose_pine_disable_active_window_menu 'on'
# Glue between tabs: a faint middle-dot in overlay color (rose-pine moon).
set -g @rose_pine_window_status_separator '#[fg=#393552,bg=default] · '
# One space of breathing room at each end of the status line.
set -g @rose_pine_status_left_prepend_section ' '
set -g @rose_pine_status_right_append_section ' '

# Which-key plugin
set -g @plugin 'alexwforsythe/tmux-which-key'

# Tmuxifier
# Trigger TPM's install command with prefix + I to install Tmuxifier to TPM's plugin directory (default is $HOME/.tmux/plugins).
# To use the tmuxifier command, you will need to add the bin directory to your PATH. If you are using the default TPM plugin directory, the bin directory will be $HOME/.tmux/plugins/tmuxifier/bin.
set -g @plugin 'jimeh/tmuxifier'

# To fix that copy-mode-vi does not work on macos
set -g @plugin 'tmux-plugins/tmux-yank'

run '~/.tmux/plugins/tpm/tpm'

# Tab style (set after tpm so rose-pine's unset_option doesn't clobber it).
# Tab style: a slanted chip around the index keeps the number visually
# distinct and reads more like a parallelepiped than a square block. Rose-pine
# moon palette: overlay/subtle for inactive, love pink for the current tab.
# When a pane is running ssh/mosh, surface that in both the tab and pane
# border so remote shells are hard to miss at a glance.
set -g pane-border-status top
set -g pane-border-style fg=#393552
set -g pane-active-border-style fg=#eb6f92
set -g pane-border-format "#{?#{||:#{==:#{pane_current_command},ssh},#{==:#{pane_current_command},mosh-client}},#[fg=#ea9a97]#[bold] 󰌘 #[default],}#[fg=#6e6a86]#{pane_current_command} #[fg=#908caa]#{b:pane_current_path}"
set -gw window-status-format         "#[fg=#393552,bg=default]#[fg=#908caa,bg=#393552,bold] #I#{?#{||:#{==:#{pane_current_command},ssh},#{==:#{pane_current_command},mosh-client}}, #[fg=#ea9a97]󰌘#[fg=#908caa],} #[fg=#393552,bg=default,nobold]#[fg=#e0def4,bg=default] #W"
set -gw window-status-current-format "#[fg=#eb6f92,bg=default]#[fg=#232136,bg=#eb6f92,bold] #I#{?#{||:#{==:#{pane_current_command},ssh},#{==:#{pane_current_command},mosh-client}}, #[fg=#232136]󰌘,} #[fg=#eb6f92,bg=default,nobold]#[fg=#eb6f92,bg=default,bold] #W"

# Resize panes (after TPM so tmux-sensible doesn't overwrite C-l)
bind-key -r -T prefix C-h resize-pane -L
bind-key -r -T prefix C-j resize-pane -D
bind-key -r -T prefix C-k resize-pane -U
bind-key -r -T prefix C-l resize-pane -R
